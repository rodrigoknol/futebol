  <meta name="google-signin-client_id"
    content="138187903716-udsrq9f59oo6a6g5ehc6hhnfrioaqsfh.apps.googleusercontent.com">
  <!-- Login -->
  <script src="/js/login-validator.js"></script>

  <link href="/css/reset.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
  <!-- Title -->
  <title>1, 2, 3, Gol!</title>
</head>

<body>
  <nav>
    <a class="nav__logo" href="/dashboard"><img src="/img/icons/ball-success.svg"
        alt="símbolo representando uma bola de futebol" style="filter:brightness(3)" height="36" /><span>1, 2, 3
        <strong>Gol!</strong></span></a>
    <div class="grid">
      <a class="hidden-mobile" href="/dashboard"><img alt="símbolo representando uma casa" src="/img/icons/home.svg" />Início</a>
      <a class="hidden-mobile" href="/manage-team"><img alt="símbolo representando uma bola de futebol" src="/img/icons/team.svg" />Time Titular</a>
      <a class="hidden-mobile" href="/market"><img alt="duas setas opostas, representando troca / comércio" src="/img/icons/trade.svg" />Mercado</a>
      <a onclick="signOut()">Sair</a>
    </div>
  </nav>
  <main>
  <h1 class="text--centered text__main-title">Monte o <span id="teamName">seu time</span></h1>
  <h2>Escolha o elenco</h2>
  <section class="grid">
    <div>
      <label for="formation">Formação</label>
      <select id="formation">
        <option value="4-3-3">4-3-3</option>
        <option value="4-1-4-1">4-1-4-1</option>
        <option value="4-4-2">4-4-2</option>
        <option value="3-5-2">3-5-2</option>
      </select>
      <!-- Field drawing -->
      <table id="playersTable" class="field">
        <!-- JS created -->
      </table>
    </div>
    <div>
      <label for="position">Jogador por posição</label>
      <select id="position">
        <option value="goalkeeper">Goleiro</option>
        <option value="wing_back">Lateral</option>
        <option value="defensor">Zagueiro</option>
        <option value="midfielder">Meio Campista</option>
        <option value="attackers">Atacante</option>
      </select>
      <div id="playersListDOM">
      </div>
      <a class="btn btn--danger" id="resetBtn" >Resetar jogadores</a>
    </div>
  </section>
  <hr />
  <h2>Estilos e táticas</h2>
  <form>
    <label for="formGameMode">Modo de jogo</label>
    <select onchange="matchData.homeTeam.gameMode = this.value" id="formGameMode">
      <option value="normal">Equilibrado</option>
      <option value="counter-atk">Contra-ataque</option>
      <option value="all-atk">Ataque total</option>
      <option value="all-def">Retranca</option>
    </select>
    <label for="formAttackStyle">Estilo de ataque</label>
    <select onchange="matchData.homeTeam.attackStyle = this.value" id="formAttackStyle">
      <option value="mixed">Misto</option>
      <option value="lateral">Pelas laterais</option>
      <option value="middle">Pelo meio</option>
    </select>
  </form>
  <hr />
  <button onclick="saveTeamData()" class="btn">Salvar o time titular</button>
</main>
<script src="/js/manageTeam.js"></script>
  <footer class="text--centered">
    <hr />
    <p>Versão <a href="/changelog">0.4.3</a></p>
    <span>Desenvolvido por <a target="_blank" href="https://www.linkedin.com/in/rodrigoknolseisen/"
        rel="noopener">Rodrigo Knolseisen</a></span>
  </footer>
  <nav class="mobile-nav">
    <a href="/dashboard"><img alt="desenho de uma casa" src="/img/icons/home.svg" height="18" />Início</a>
    <a href="/manage-team"><img alt="símbolo representando uma bola de futebol" src="/img/icons/team.svg" height="18" />Time Titular</a>
    <a href="/market"><img alt="duas setas opostas, representando troca / comércio" src="/img/icons/trade.svg" height="18" />Mercado</a>
  </nav>
</body>
<script src="/js/util.js" async defer></script>
</html>
