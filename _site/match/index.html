<body>
  <nav>
    <a class="nav__logo" href="/dashboard"><img src="/img/icons/ball-success.svg"
        alt="símbolo representando uma bola de futebol" style="filter:brightness(3)" height="36" /><span>1, 2, 3
        <strong>Gol!</strong></span></a>
    <div class="grid">
      <a class="hidden-mobile" href="/dashboard"><img alt="símbolo representando uma casa" src="/img/icons/home.svg" />Início</a>
      <a class="hidden-mobile" href="/manage-team"><img alt="símbolo representando uma bola de futebol" src="/img/icons/team.svg" />Time Titular</a>

    </div>
  </nav>
  <main>
  <h1 style="flex-direction: initial;" class="text--centered text__main-title grid">
    <span class="text--ellipsis" id="theHomeTeam">Time da casa </span>
    <span style="flex: initial;">
      <span id="scoreHomeTeam">0</span> x <span id="scoreAlwayTeam">0</span> 
    </span>
    <span class="text--ellipsis" id="theAlwayTeam"> Visitante</span>
  </h1>
  <!-- Teams details -->
  <h2 class="hidden-mobile">Detalhes dos times</h2>
  <section class="grid hidden-mobile">
    <div>
      <h3>Time da casa</h3>
      <br />
      <ul id="dashboardHome" class="list--no-style">
      </ul>
    </div>
    <div>
      <h3>Time visitante</h3>
      <br />
      <ul id="dashboardAlway" class="list--no-style">
      </ul>
    </div>
  </section>
  <hr class="hidden-mobile" />

  <!-- Game details -->
  <article>
    <h2>Jogo lance-a-lance</h2>
    <div id="content"></div>
  </article>
</main>
<script async defer src="/js/match.js"></script>
