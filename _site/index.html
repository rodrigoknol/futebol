<html lang="pt-br">
<head>
  <!-- Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="57x57" href="/img/favicon/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/img/favicon/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/img/favicon/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/img/favicon/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/img/favicon/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/img/favicon/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/img/favicon/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/img/favicon/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="/img/favicon/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="/img/favicon/manifest.json">
  <meta name="msapplication-TileImage" content="/img/favicon/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">
  <!-- CSS -->
  <link href="/css/reset.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
  <!-- Title -->
  <title>Jogo de Futebol</title>
</head>
<body>
  <nav>
    <a href="/"><img src="/img/icons/ball-success.svg" style="filter:brightness(3)" height="36" /></a>
  </nav>
  <main>
  <h1 class="text--centered text__main-title">Monte o seu time</h1>
  <h2>Escolha o elenco</h2>
  <section class="grid">
    <div>
      <label for="formation">Formação</label>
      <select id="formation">
        <option value="4-3-3">4-3-3</option>
        <option value="4-1-4-1">4-1-4-1</option>
        <option value="4-4-2">4-4-2</option>
        <option value="3-5-2">3-5-2</option>
      </select>
      <!-- Field drawing -->
      <table id="playersTable" class="field">
        <!-- JS created -->
      </table>
    </div>
    <div>
      <label for="position">Jogador por posição</label>
      <select id="position">
        <option value="goalkeeper">Goleiro</option>
        <option value="wing_back">Lateral</option>
        <option value="defensor">Zagueiro</option>
        <option value="midfielder">Meio Campista</option>
        <option value="attackers">Atacante</option>
      </select>
      <div id="playersListDOM">
      </div>
      <a class="btn" onclick="createFormation.changesFormation()">Resetar jogadores</a>
    </div>
  </section>
  <hr />
  <h2>Estilos e táticas</h2>
  <form>
    <label for="formGameMode">Modo de jogo</label>
    <select onchange="matchData.homeTeam.gameMode = this.value" id="formGameMode">
      <option value="normal">Equilibrado</option>
      <option value="counter-atk">Contra-ataque</option>
      <option value="all-atk">Ataque total</option>
      <option value="all-def">Retranca</option>
    </select>
    <label for="formAttackStyle">Estilo de ataque</label>
    <select onchange="matchData.homeTeam.attackStyle = this.value" id="formAttackStyle">
      <option value="mixed">Misto</option>
      <option value="lateral">Pelas laterais</option>
      <option value="middle">Pelo meio</option>
    </select>
  </form>
  <hr />
  <button class="btn" >Salvar o time</button>
  <a class="btn" disabled href="/match">Rodar uma partida</a>
</main>
<script src="js/manageTeam.js"></script>
  <footer class="text--centered">
    <hr />
    <p>Versão 0.0.0</p>
  </footer>
</body>
</html>
