<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta name="mobile-web-app-capable" content="yes">
</head>
<script>
  function fullScreen(){
    const iframe = document.getElementById('frame');
    iframe.webkitRequestFullScreen();
  }
</script>
<body>
  <button style="display: block;" id="fs" onclick="fullScreen()">Tela cheia</button>
  <iframe id="frame" allowfullscreen frameborder="0" src="https://ciandt.invisionapp.com/share/N7WRO69FWZT"></iframe>
</body>
</html>
